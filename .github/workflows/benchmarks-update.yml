name: Benchmarks Update

on:
  schedule:
    - cron: "0 6 * * 1" # weekly Mondays 06:00 UTC
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
          python -m playwright install --with-deps

      - name: Update benchmarks
        run: |
          python -m adsim_ingestion update --db data/benchmarks.duckdb --all
          python -m adsim_ingestion calibrate --db data/benchmarks.duckdb --out data/calibration.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: adsim-benchmarks
          path: |
            data/benchmarks.duckdb
            data/calibration.json

